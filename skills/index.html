<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skills — moved</title>
  <meta http-equiv="refresh" content="0; url=../#/skills">
  <script>
    // Folded into the main platform. Preserve deep links: skills/#/skill/<id> -> ../#/skills/<id>
    (function () {
      var m = (location.hash || '').match(/#\/skill\/([^/?#]+)/);
      location.replace('../#/skills' + (m ? '/' + m[1] : ''));
    })();
  </script>
  <style>
    body { margin:0; min-height:100vh; display:grid; place-items:center;
      font:16px/1.5 'DM Sans','Segoe UI',Roboto,Helvetica,Arial,sans-serif; color:#1f2230;
      background:linear-gradient(180deg,#fbfcfa,#f7f8f6); }
    a { color:#5f8fa4; font-weight:600; }
  </style>
</head>
<body>
  <p>The Skills library now lives in the platform. Redirecting… or <a href="../#/skills">open it here</a>.</p>
</body>
</html>
